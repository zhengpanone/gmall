--- #################### 注册中心相关配置 ####################
spring:
  cloud:
    nacos:
      server-addr: ${nacos.server.address:127.0.0.1:8848}
      username: nacos
      password: nacos
      discovery:
        group: gmall # 命名空间。这里使用 gmall 开发环境
        namespace: gmall
        metadata:
          version: 1.0.0 # 服务实例的版本号，可用于灰度发布

      # Nacos Config 配置项，对应 NacosConfigProperties 配置属性类
      config:
        enabled: true
        file-extension: yaml
        group: gmall
        namespace: gmall


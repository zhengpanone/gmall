spring:
  application:
    name: member-server

  profiles:
    active: local

server:
  port: ${APP_SERVER_PORT:48082}

#debug: true
logging:
  level:
    org.springframework.beans.factory.support: DEBUG
--- # cloud 相关配置

spring:
  cloud:
    nacos:
      server-addr: ${nacos.server.address:127.0.0.1:30848}
      username: nacos
      password: nacos
      discovery:
        group: gmall
        namespace: gmall
        metadata:
          version: 1.0.0 # 服务实例的版本号，可用于灰度发布
      config:
        namespace: gmall
        group: gmall



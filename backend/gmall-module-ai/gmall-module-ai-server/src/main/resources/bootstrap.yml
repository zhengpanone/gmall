spring:
  application:
    name: ai-server
  profiles:
    active: local
  jmx:
    enabled: true

server:
  port: 48085
  servlet:
    context-path: /ai
    # 大模型型对话中文乱码UTF-8编码处理
    encoding:
      enabled: true
      force: true
      charset: UTF-8
      force-response: true


# 日志文件配置。注意，如果 logging.file.name 不放在 bootstrap.yaml 配置文件，
# 而是放在 application.yaml 中，会导致出现 LOG_FILE_IS_UNDEFINED 文件
logging:
  file:
    # name: ${user.home}/log/${spring.application.name}.log # 日志文件名，全路径
    name: /data/gmall/log/gmall-infra/${spring.application.name}.log
  level:
    web: debug
    #    root: debug
    com.zp.gmall: debug